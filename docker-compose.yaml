version: '3.8'

services:
  alpha-api:
    build: .
    image: alpha-engine:latest
    container_name: alpha-engine-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - alpha-data:/app/data
      - alpha-artifacts:/app/artifacts
    environment:
      - ALPHA_ENGINE_ENV=${ALPHA_ENGINE_ENV:-production}
      - API_PORT=${API_PORT:-8000}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8000}
      - TRADING_UI_USER=${TRADING_UI_USER:?TRADING_UI_USER is required}
      - TRADING_UI_PASSWORD=${TRADING_UI_PASSWORD:?TRADING_UI_PASSWORD is required}
      - TRADING_ARTIFACTS_DIR=/app/artifacts
      - TRADING_DATA_DIR=/app/data
      - TRADING_REPORTS_DIR=/app/reports
      - TRADING_STATIC_SITE_DIR=/app/site
      - MLFLOW_TRACKING_URI=sqlite:///artifacts/mlflow.db
    restart: unless-stopped

volumes:
  alpha-data:
  alpha-artifacts:
