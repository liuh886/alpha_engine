# Canonical US fixed-10D research preparation contract.
schema_version: "1.1"
experiment_id: "us_10d_qqq_baseline"
market: "us"
benchmark: "QQQ"

universe:
  source: "configs/research_universes/us_curated_equities_v1.yaml"
  market_key: "us"
  universe_id: "us_curated_equities_v1"
  membership_mode: "static_curated"
  membership_as_of: "2026-07-11"
  asset_type: "equity"
  survivorship_bias: true
  min_symbols: 30
  alignment_mode: "strict"

factor_library:
  source: "configs/factor_libraries/us_ohlcv.yaml"
  groups:
    - "momentum"
    - "momentum_volatility"
    - "momentum_volatility_volume"
    - "risk_controlled_momentum"

candidate_grid:
  ranker:
    calibrations:
      - n_gain_bins: 3
        num_boost_round: 100
        num_leaves: 15
        min_data_in_leaf: 5
        learning_rate: 0.05
      - n_gain_bins: 5
        num_boost_round: 100
        num_leaves: 31
        min_data_in_leaf: 10
        learning_rate: 0.05
      - n_gain_bins: 7
        num_boost_round: 200
        num_leaves: 31
        min_data_in_leaf: 10
        learning_rate: 0.05
      - n_gain_bins: 10
        num_boost_round: 200
        num_leaves: 63
        min_data_in_leaf: 20
        learning_rate: 0.05
  factor_baselines:
    - "factor:us_momentum_10d"
    - "factor:us_risk_controlled_10d"

strategy:
  horizon_days: 10
  holding_days: 10
  rebalance_days: 10
  top_n: 15
  bottom_n: 15
  return_expression: "Ref($close, -10) / $close - 1"
  return_provenance: "raw_forward_return"
  research_only: true

walk_forward:
  requested_train_start: "2021-01-01"
  test_end: "2026-06-18"
  first_test_year: 2024
  last_test_year: 2026
  min_windows: 3
  train_embargo_sessions: 10
  partial_window_policy: "complete_windows_only"

evaluation:
  benchmark_mode: "reference_only"
  metrics:
    - "mean_icir"
    - "mean_rank_ic"
    - "mean_spread"
    - "worst_drawdown"
    - "ready_ratio"
    - "positive_icir_ratio"
    - "positive_spread_ratio"
  gate_profile: "ten_day_model_gates_v1"

outputs:
  artifact_profile: "research_run_v1"
