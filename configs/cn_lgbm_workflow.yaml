qlib_init:
  provider_uri: data/watchlist
  region: cn
market: cn
benchmark: '000300'
task:
  model:
    class: LGBModel
    module_path: qlib.contrib.model.gbdt
    kwargs:
      loss: mse
      colsample_bytree: 0.8879
      learning_rate: 0.05
      subsample: 0.8789
      lambda_l1: 1.0
      lambda_l2: 1.0
      max_depth: 10
      num_leaves: 128
      num_threads: 20
      early_stopping_rounds: 50
  dataset:
    class: DatasetH
    module_path: qlib.data.dataset
    kwargs:
      handler:
        class: DataHandlerLP
        module_path: qlib.data.dataset.handler
        kwargs:
          start_time: '2021-01-01'
          end_time: '2026-06-25'
          instruments: cn
          learn_processors:
          - class: DropnaLabel
          - class: CSZScoreNorm
            kwargs:
              fields_group: label
          infer_processors:
          - class: CSZScoreNorm
            kwargs:
              fields_group: feature
          data_loader:
            class: QlibDataLoader
            kwargs:
              config:
                feature:
                # === Alpha158 基础特征 (K-bar) ===
                - ($close-$open)/$open
                - ($high-$low)/$open
                - ($close-$open)/($high-$low+1e-12)
                - ($high-Greater($open, $close))/$open
                - (Less($open, $close)-$low)/$open
                - (2*$close-$high-$low)/$open
                - $open/$close
                - $high/$close
                - $low/$close
                - $vwap/$close
                # === 动量因子 ===
                - $close/Ref($close, 1)-1
                - $close/Ref($close, 5)-1
                - $close/Ref($close, 10)-1
                - $close/Ref($close, 20)-1
                - $close/Ref($close, 60)-1
                - Ref($close, 5)/$close
                - Ref($close, 10)/$close
                - Ref($close, 20)/$close
                - Ref($close, 60)/$close
                # === 均线偏离 ===
                - $close/Mean($close, 5)-1
                - $close/Mean($close, 10)-1
                - $close/Mean($close, 20)-1
                - $close/Mean($close, 60)-1
                - Mean($close, 5)/$close
                - Mean($close, 10)/$close
                - Mean($close, 20)/$close
                - Mean($close, 60)/$close
                # === 波动率 ===
                - Std($close, 5)/$close
                - Std($close, 10)/$close
                - Std($close, 20)/$close
                - Std($close, 60)/$close
                - Std($close/Ref($close,1)-1, 5)
                - Std($close/Ref($close,1)-1, 10)
                - Std($close/Ref($close,1)-1, 20)
                - Std($close/Ref($close,1)-1, 60)
                # === 趋势强度 ===
                - Slope($close, 5)/$close
                - Slope($close, 10)/$close
                - Slope($close, 20)/$close
                - Slope($close, 60)/$close
                - Rsquare($close, 5)
                - Rsquare($close, 10)
                - Rsquare($close, 20)
                - Rsquare($close, 60)
                # === 成交量因子 ===
                - $volume/Mean($volume, 5)
                - $volume/Mean($volume, 10)
                - $volume/Mean($volume, 20)
                - $volume/Mean($volume, 60)
                - Mean($volume, 5)/$volume
                - Mean($volume, 10)/$volume
                - Mean($volume, 20)/$volume
                - Mean($volume, 60)/$volume
                - Corr($close, $volume, 5)
                - Corr($close, $volume, 10)
                - Corr($close, $volume, 20)
                # === 价格位置 (Stochastic) ===
                - ($close-Min($low, 5))/(Max($high, 5)-Min($low, 5)+1e-12)
                - ($close-Min($low, 10))/(Max($high, 10)-Min($low, 10)+1e-12)
                - ($close-Min($low, 20))/(Max($high, 20)-Min($low, 20)+1e-12)
                - ($close-Min($low, 60))/(Max($high, 60)-Min($low, 60)+1e-12)
                # === 极值位置 ===
                - Max($high, 5)/$close
                - Max($high, 10)/$close
                - Max($high, 20)/$close
                - Max($high, 60)/$close
                - Min($low, 5)/$close
                - Min($low, 10)/$close
                - Min($low, 20)/$close
                - Min($low, 60)/$close
                # === 分位数 ===
                - Quantile($close, 5, 0.8)/$close
                - Quantile($close, 10, 0.8)/$close
                - Quantile($close, 20, 0.8)/$close
                - Quantile($close, 60, 0.8)/$close
                - Quantile($close, 5, 0.2)/$close
                - Quantile($close, 10, 0.2)/$close
                - Quantile($close, 20, 0.2)/$close
                - Quantile($close, 60, 0.2)/$close
                # === 排名 ===
                - Rank($close, 5)
                - Rank($close, 10)
                - Rank($close, 20)
                - Rank($close, 60)
                # === 残差 ===
                - Resi($close, 5)/$close
                - Resi($close, 10)/$close
                - Resi($close, 20)/$close
                - Resi($close, 60)/$close
                # === ATR (Average True Range) ===
                - Mean(Max($high-$low, Abs($high-Ref($close,1)), Abs($low-Ref($close,1))), 5)/$close
                - Mean(Max($high-$low, Abs($high-Ref($close,1)), Abs($low-Ref($close,1))), 10)/$close
                - Mean(Max($high-$low, Abs($high-Ref($close,1)), Abs($low-Ref($close,1))), 20)/$close
                # === 动量加速度 ===
                - ($close/Ref($close,5)-1) - Ref($close/Ref($close,5)-1, 5)
                - ($close/Ref($close,10)-1) - Ref($close/Ref($close,10)-1, 10)
                - ($close/Ref($close,20)-1) - Ref($close/Ref($close,20)-1, 20)
                # === 价量背离 ===
                - ($close/Ref($close,5)-1) / ($volume/Ref($volume,5)-1+1e-12)
                - ($close/Ref($close,10)-1) / ($volume/Ref($volume,10)-1+1e-12)
                # === 高-低相对强度 (RSI-like) ===
                - Sum(Greater($close-Ref($close, 1), 0), 5)/(Sum(Abs($close-Ref($close, 1)), 5)+1e-12)
                - Sum(Greater($close-Ref($close, 1), 0), 10)/(Sum(Abs($close-Ref($close, 1)), 10)+1e-12)
                # === 波动率变化 ===
                - Std($close/Ref($close,1)-1, 5) / Std($close/Ref($close,1)-1, 20)
                - Std($close/Ref($close,1)-1, 10) / Std($close/Ref($close,1)-1, 60)
                # === Extra features (from strategy profile) ===
                - $close/Ref($close, 5)-1
                - $close/Ref($close, 10)-1
                - $close/Ref($close, 20)-1
                - Std($close, 10)
                - $volume/Ref($volume, 10)-1
                label:
                - Ref($close, -10) / Ref($close, -1) - 1
      segments:
        train:
        - '2021-01-01'
        - '2024-12-31'
        valid:
        - '2025-01-01'
        - '2025-12-31'
        test:
        - '2026-01-01'
        - '2026-06-25'
port_analysis_config:
  strategy:
    class: BiweeklyTrendStrategy
    module_path: src.strategies.biweekly_trend_strategy
    kwargs:
      signal: <PRED>
      topk: 5
      rebalance_steps: 10
      min_hold_days: 10
      sell_ma_window: 60
      sell_rank_threshold: 20
      use_risk_manager: true
      risk_config:
        stop_loss_pct: -0.1
        trailing_stop_pct: -0.15
        max_position_weight: 0.2
        max_sector_weight: 0.35
        target_portfolio_vol: 0.15
      buy_score_threshold: 0.0
      sell_score_threshold: 0.0
  backtest:
    start_time: '2026-01-01'
    end_time: '2026-06-25'
    account: 10000
    benchmark: '000300'
    exchange_kwargs:
      limit_threshold: 0.095
      deal_price: close
      open_cost: 0.001
      close_cost: 0.001
      min_cost: 0
