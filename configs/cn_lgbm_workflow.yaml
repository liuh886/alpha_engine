qlib_init:
  provider_uri: data/watchlist
  region: cn
market: cn
benchmark: '000300'
task:
  model:
    class: LGBModel
    module_path: qlib.contrib.model.gbdt
    kwargs:
      loss: mse
      colsample_bytree: 0.8879
      learning_rate: 0.05
      subsample: 0.8789
      lambda_l1: 1.0
      lambda_l2: 1.0
      max_depth: 10
      num_leaves: 128
      num_threads: 20
      early_stopping_rounds: 50
  dataset:
    class: DatasetH
    module_path: qlib.data.dataset
    kwargs:
      handler:
        class: DataHandlerLP
        module_path: qlib.data.dataset.handler
        kwargs:
          start_time: '2021-01-01'
          end_time: '2026-04-03'
