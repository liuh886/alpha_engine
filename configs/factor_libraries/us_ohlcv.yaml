# US OHLCV Factor Library
# Schema 1.0 — canonical grouped OHLCV definitions for contract preparation.
schema_version: "1.0"

groups:
  momentum:
    description: "Price momentum at multiple horizons"
    factors:
      - id: "us:momentum:ret_5d"
        expression: "$close/Ref($close,5)-1"
        family: "momentum"
        description: "5-day price momentum"
      - id: "us:momentum:ret_10d"
        expression: "$close/Ref($close,10)-1"
        family: "momentum"
        description: "10-day price momentum"
      - id: "us:momentum:ret_20d"
        expression: "$close/Ref($close,20)-1"
        family: "momentum"
        description: "20-day price momentum"

  momentum_volatility:
    description: "Momentum plus volatility features"
    factors:
      - id: "us:momentum:ret_5d@momentum_volatility"
        expression: "$close/Ref($close,5)-1"
        family: "momentum"
        description: "5-day price momentum"
      - id: "us:momentum:ret_10d@momentum_volatility"
        expression: "$close/Ref($close,10)-1"
        family: "momentum"
        description: "10-day price momentum"
      - id: "us:momentum:ret_20d@momentum_volatility"
        expression: "$close/Ref($close,20)-1"
        family: "momentum"
        description: "20-day price momentum"
      - id: "us:volatility:std_ret1_10d"
        expression: "Std($close/Ref($close,1)-1,10)"
        family: "volatility"
        description: "10-day rolling standard deviation of daily returns"
      - id: "us:volatility:std_ret1_20d"
        expression: "Std($close/Ref($close,1)-1,20)"
        family: "volatility"
        description: "20-day rolling standard deviation of daily returns"

  momentum_volatility_volume:
    description: "Momentum, volatility, and volume features"
    factors:
      - id: "us:momentum:ret_5d@momentum_volatility_volume"
        expression: "$close/Ref($close,5)-1"
        family: "momentum"
        description: "5-day price momentum"
      - id: "us:momentum:ret_10d@momentum_volatility_volume"
        expression: "$close/Ref($close,10)-1"
        family: "momentum"
        description: "10-day price momentum"
      - id: "us:momentum:ret_20d@momentum_volatility_volume"
        expression: "$close/Ref($close,20)-1"
        family: "momentum"
        description: "20-day price momentum"
      - id: "us:volatility:std_ret1_10d@momentum_volatility_volume"
        expression: "Std($close/Ref($close,1)-1,10)"
        family: "volatility"
        description: "10-day rolling standard deviation of daily returns"
      - id: "us:volatility:std_ret1_20d@momentum_volatility_volume"
        expression: "Std($close/Ref($close,1)-1,20)"
        family: "volatility"
        description: "20-day rolling standard deviation of daily returns"
      - id: "us:volume:vol_mom_10d"
        expression: "$volume/Ref($volume,10)-1"
        family: "volume"
        description: "10-day volume momentum"
      - id: "us:volume:vol_vs_ma20"
        expression: "$volume/Mean($volume,20)-1"
        family: "volume"
        description: "Volume relative to 20-day moving average"

  risk_controlled_momentum:
    description: "Momentum, volatility, and risk-controlled momentum"
    factors:
      - id: "us:momentum:ret_5d@risk_controlled_momentum"
        expression: "$close/Ref($close,5)-1"
        family: "momentum"
        description: "5-day price momentum"
      - id: "us:momentum:ret_10d@risk_controlled_momentum"
        expression: "$close/Ref($close,10)-1"
        family: "momentum"
        description: "10-day price momentum"
      - id: "us:momentum:ret_20d@risk_controlled_momentum"
        expression: "$close/Ref($close,20)-1"
        family: "momentum"
        description: "20-day price momentum"
      - id: "us:volatility:std_ret1_10d@risk_controlled_momentum"
        expression: "Std($close/Ref($close,1)-1,10)"
        family: "volatility"
        description: "10-day rolling standard deviation of daily returns"
      - id: "us:volatility:std_ret1_20d@risk_controlled_momentum"
        expression: "Std($close/Ref($close,1)-1,20)"
        family: "volatility"
        description: "20-day rolling standard deviation of daily returns"
      - id: "us:risk_controlled:ret10_per_vol10"
        expression: "($close/Ref($close,10)-1)/(Std($close/Ref($close,1)-1,10)+1e-12)"
        family: "risk_controlled"
        description: "10-day return divided by 10-day volatility"
      - id: "us:risk_controlled:ret20_per_vol20"
        expression: "($close/Ref($close,20)-1)/(Std($close/Ref($close,1)-1,20)+1e-12)"
        family: "risk_controlled"
        description: "20-day return divided by 20-day volatility"

  factor_baselines:
    description: "Single-factor baselines for direction diagnostics"
    factors:
      - id: "factor:us_momentum_10d"
        expression: "$close/Ref($close,10)-1"
        family: "baseline"
        description: "10-day raw momentum baseline"
      - id: "factor:us_risk_controlled_10d"
        expression: "($close/Ref($close,10)-1)/(Std($close/Ref($close,1)-1,10)+1e-12)"
        family: "baseline"
        description: "10-day risk-controlled momentum baseline"
