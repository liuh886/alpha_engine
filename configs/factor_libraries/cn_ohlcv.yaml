# CN OHLCV Factor Library
# Schema 1.0. Corrected interaction/risk-adjusted formulas use :v2 ids so
# legacy #91 evidence cannot be silently mixed with canonical semantics.
schema_version: "1.0"

groups:
  cn_short_reversal_liquidity:
    description: "Short-horizon reversal, mean reversion, and liquidity shocks"
    factors:
      - id: "cn:reversal:ref1_close_inv"
        expression: "Ref($close,1)/$close-1"
        family: "reversal"
        description: "1-day inverse close return"
      - id: "cn:reversal:ref3_close_inv"
        expression: "Ref($close,3)/$close-1"
        family: "reversal"
        description: "3-day inverse close return"
      - id: "cn:reversal:ref5_close_inv"
        expression: "Ref($close,5)/$close-1"
        family: "reversal"
        description: "5-day inverse close return"
      - id: "cn:mean_reversion:close_vs_ma5"
        expression: "$close/Mean($close,5)-1"
        family: "mean_reversion"
        description: "Close deviation from 5-day moving average"
      - id: "cn:mean_reversion:close_vs_ma10"
        expression: "$close/Mean($close,10)-1"
        family: "mean_reversion"
        description: "Close deviation from 10-day moving average"
      - id: "cn:mean_reversion:close_vs_ma20"
        expression: "$close/Mean($close,20)-1"
        family: "mean_reversion"
        description: "Close deviation from 20-day moving average"
      - id: "cn:liquidity:vol_vs_ma5"
        expression: "$volume/Mean($volume,5)-1"
        family: "liquidity"
        description: "Volume relative to 5-day average"
      - id: "cn:liquidity:vol_vs_ma10"
        expression: "$volume/Mean($volume,10)-1"
        family: "liquidity"
        description: "Volume relative to 10-day average"
      - id: "cn:liquidity:vol_vs_ma20"
        expression: "$volume/Mean($volume,20)-1"
        family: "liquidity"
        description: "Volume relative to 20-day average"

  cn_volatility_reversal:
    description: "Reversal, volatility, and risk-adjusted returns"
    factors:
      - id: "cn:reversal:ref1_close_inv@cn_volatility_reversal"
        expression: "Ref($close,1)/$close-1"
        family: "reversal"
        description: "1-day inverse close return"
      - id: "cn:reversal:ref3_close_inv@cn_volatility_reversal"
        expression: "Ref($close,3)/$close-1"
        family: "reversal"
        description: "3-day inverse close return"
      - id: "cn:reversal:ref5_close_inv@cn_volatility_reversal"
        expression: "Ref($close,5)/$close-1"
        family: "reversal"
        description: "5-day inverse close return"
      - id: "cn:volatility:std_ret1_5d"
        expression: "Std($close/Ref($close,1)-1,5)"
        family: "volatility"
        description: "5-day rolling standard deviation of daily returns"
      - id: "cn:volatility:std_ret1_10d"
        expression: "Std($close/Ref($close,1)-1,10)"
        family: "volatility"
        description: "10-day rolling standard deviation of daily returns"
      - id: "cn:volatility:std_ret1_20d"
        expression: "Std($close/Ref($close,1)-1,20)"
        family: "volatility"
        description: "20-day rolling standard deviation of daily returns"
      - id: "cn:volatility:hl_range_pct"
        expression: "($high-$low)/($close+1e-12)"
        family: "volatility"
        description: "High-low range as fraction of close"
      - id: "cn:risk_adjusted:ret5_per_vol5:v2"
        expression: "($close/Ref($close,5)-1)/(Std($close/Ref($close,1)-1,5)+1e-12)"
        family: "risk_adjusted"
        description: "5-day return divided by 5-day volatility"
      - id: "cn:risk_adjusted:ret10_per_vol10:v2"
        expression: "($close/Ref($close,10)-1)/(Std($close/Ref($close,1)-1,10)+1e-12)"
        family: "risk_adjusted"
        description: "10-day return divided by 10-day volatility"
      - id: "cn:risk_adjusted:ret20_per_vol20:v2"
        expression: "($close/Ref($close,20)-1)/(Std($close/Ref($close,1)-1,20)+1e-12)"
        family: "risk_adjusted"
        description: "20-day return divided by 20-day volatility"

  cn_price_volume_pressure:
    description: "Momentum, liquidity, and price-volume interaction signals"
    factors:
      - id: "cn:momentum:ret_3d"
        expression: "$close/Ref($close,3)-1"
        family: "momentum"
        description: "3-day price momentum"
      - id: "cn:momentum:ret_5d"
        expression: "$close/Ref($close,5)-1"
        family: "momentum"
        description: "5-day price momentum"
      - id: "cn:momentum:ret_10d"
        expression: "$close/Ref($close,10)-1"
        family: "momentum"
        description: "10-day price momentum"
      - id: "cn:momentum:ret_20d"
        expression: "$close/Ref($close,20)-1"
        family: "momentum"
        description: "20-day price momentum"
      - id: "cn:liquidity:vol_vs_ma5@cn_price_volume_pressure"
        expression: "$volume/Mean($volume,5)-1"
        family: "liquidity"
        description: "Volume relative to 5-day average"
      - id: "cn:liquidity:vol_vs_ma10@cn_price_volume_pressure"
        expression: "$volume/Mean($volume,10)-1"
        family: "liquidity"
        description: "Volume relative to 10-day average"
      - id: "cn:liquidity:vol_vs_ma20@cn_price_volume_pressure"
        expression: "$volume/Mean($volume,20)-1"
        family: "liquidity"
        description: "Volume relative to 20-day average"
      - id: "cn:pressure:ret1_x_vol_shock_5:v2"
        expression: "($close/Ref($close,1)-1)*($volume/Mean($volume,5)-1)"
        family: "pressure"
        description: "1-day return multiplied by 5-day volume shock"
      - id: "cn:pressure:ret5_x_vol_shock_10:v2"
        expression: "($close/Ref($close,5)-1)*($volume/Mean($volume,10)-1)"
        family: "pressure"
        description: "5-day return multiplied by 10-day volume shock"
      - id: "cn:pressure:hl_ratio"
        expression: "($high/$low-1)"
        family: "pressure"
        description: "High-to-low ratio"

  cn_balanced_ohlcv:
    description: "Balanced momentum, reversal, volatility, and liquidity set"
    factors:
      - id: "cn:momentum:ret_3d@cn_balanced_ohlcv"
        expression: "$close/Ref($close,3)-1"
        family: "momentum"
        description: "3-day price momentum"
      - id: "cn:momentum:ret_5d@cn_balanced_ohlcv"
        expression: "$close/Ref($close,5)-1"
        family: "momentum"
        description: "5-day price momentum"
      - id: "cn:momentum:ret_10d@cn_balanced_ohlcv"
        expression: "$close/Ref($close,10)-1"
        family: "momentum"
        description: "10-day price momentum"
      - id: "cn:momentum:ret_20d@cn_balanced_ohlcv"
        expression: "$close/Ref($close,20)-1"
        family: "momentum"
        description: "20-day price momentum"
      - id: "cn:reversal:ref1_close_inv@cn_balanced_ohlcv"
        expression: "Ref($close,1)/$close-1"
        family: "reversal"
        description: "1-day inverse close return"
      - id: "cn:reversal:ref3_close_inv@cn_balanced_ohlcv"
        expression: "Ref($close,3)/$close-1"
        family: "reversal"
        description: "3-day inverse close return"
      - id: "cn:reversal:ref5_close_inv@cn_balanced_ohlcv"
        expression: "Ref($close,5)/$close-1"
        family: "reversal"
        description: "5-day inverse close return"
      - id: "cn:volatility:std_ret1_5d@cn_balanced_ohlcv"
        expression: "Std($close/Ref($close,1)-1,5)"
        family: "volatility"
        description: "5-day rolling standard deviation"
      - id: "cn:volatility:std_ret1_10d@cn_balanced_ohlcv"
        expression: "Std($close/Ref($close,1)-1,10)"
        family: "volatility"
        description: "10-day rolling standard deviation"
      - id: "cn:volatility:std_ret1_20d@cn_balanced_ohlcv"
        expression: "Std($close/Ref($close,1)-1,20)"
        family: "volatility"
        description: "20-day rolling standard deviation"
      - id: "cn:volatility:hl_range_pct@cn_balanced_ohlcv"
        expression: "($high-$low)/($close+1e-12)"
        family: "volatility"
        description: "High-low range as fraction of close"
      - id: "cn:liquidity:vol_vs_ma5@cn_balanced_ohlcv"
        expression: "$volume/Mean($volume,5)-1"
        family: "liquidity"
        description: "Volume relative to 5-day average"
      - id: "cn:liquidity:vol_vs_ma10@cn_balanced_ohlcv"
        expression: "$volume/Mean($volume,10)-1"
        family: "liquidity"
        description: "Volume relative to 10-day average"
      - id: "cn:liquidity:vol_vs_ma20@cn_balanced_ohlcv"
        expression: "$volume/Mean($volume,20)-1"
        family: "liquidity"
        description: "Volume relative to 20-day average"

  factor_baselines:
    description: "Single-factor baselines for direction diagnostics"
    factors:
      - id: "factor:cn_momentum_10d"
        expression: "$close/Ref($close,10)-1"
        family: "baseline"
        description: "10-day raw momentum baseline"
      - id: "factor:cn_reversal_5d"
        expression: "Ref($close,5)/$close-1"
        family: "baseline"
        description: "5-day reversal baseline"
      - id: "factor:cn_volatility_10d"
        expression: "Std($close/Ref($close,1)-1,10)"
        family: "baseline"
        description: "10-day rolling volatility baseline"
      - id: "factor:cn_volume_shock_10d"
        expression: "$volume/Mean($volume,10)-1"
        family: "baseline"
        description: "10-day volume shock baseline"
