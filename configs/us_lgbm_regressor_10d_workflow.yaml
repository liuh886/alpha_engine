# US LGBMRegressor workflow — T+10 label
# Experimental A/B workflow for PR #56. PR #57 remains the preferred
# winner-bucket mainline strategy direction.
#
# Cloned from us_lgbm_workflow.yaml and migrated:
#   - label: T+20 → T+10
#   - objective: binary → regression
#   - model class: LGBMClassifier → LGBMRegressor
#   - model artifact: us_regressor.pkl

qlib_init:
  provider_uri: data/watchlist
  region: us

market: &market us
# The published US watchlist snapshot has broad universe coverage from
# 2021-04-05.  Starting in 2018 produces empty Alpha158 training segments.
start_time: &start_time "2021-04-05"
end_time: &end_time "2024-12-31"
fit_start_time: &fit_start_time "2021-04-05"
fit_end_time: &fit_end_time "2023-12-31"

task:
  model:
    class: LGBMRegressor
    module_path: lightgbm
    kwargs:
      objective: regression
      boosting_type: gbdt
      n_estimators: 1000
      learning_rate: 0.05
      num_leaves: 63
      max_depth: -1
      min_child_samples: 50
      feature_fraction: 0.8
      bagging_fraction: 0.8
      bagging_freq: 5
      reg_alpha: 0.1
      reg_lambda: 0.1
      verbose: -1
      n_jobs: -1

  dataset:
    class: DatasetH
    module_path: qlib.data.dataset
    kwargs:
      handler:
        class: Alpha158
        module_path: qlib.contrib.data.handler
        kwargs:
          instruments: *market
          start_time: *start_time
          end_time: *end_time
          fit_start_time: *fit_start_time
          fit_end_time: *fit_end_time
          infer_processors:
            - class: RobustZScoreNorm
              kwargs:
                fields_group: feature
                clip_outlier: true
            - class: Fillna
              kwargs:
                fields_group: feature
          learn_processors:
            - class: DropnaLabel
            - class: CSRankNorm
              kwargs:
                fields_group: label
          label:
            - "Ref($close, -10) / $close - 1"
      segments:
        train: [*fit_start_time, *fit_end_time]
        valid: ["2024-01-01", "2024-06-30"]
        test: ["2024-07-01", *end_time]

  record:
    - class: SignalRecord
      module_path: qlib.workflow.record_temp
    - class: SigAnaRecord
      module_path: qlib.workflow.record_temp

  dump_path: models/us_regressor.pkl
