qlib_init:
  provider_uri: data/watchlist
  region: us
market: us
benchmark: QQQ
task:
  model:
    class: LGBModel
    module_path: qlib.contrib.model.gbdt
    kwargs:
      loss: mse
      colsample_bytree: 0.8879
      learning_rate: 0.05
      subsample: 0.8789
      lambda_l1: 1.0
      lambda_l2: 1.0
      max_depth: 10
      num_leaves: 128
      num_threads: 20
      early_stopping_rounds: 50
  dataset:
    class: DatasetH
    module_path: qlib.data.dataset
    kwargs:
      handler:
        class: DataHandlerLP
        module_path: qlib.data.dataset.handler
        kwargs:
          start_time: '2021-01-01'
          end_time: '2026-06-18'
          instruments: us
          learn_processors:
          - class: DropnaLabel
          - class: CSZScoreNorm
            kwargs:
              fields_group: label
          infer_processors:
          - class: CSZScoreNorm
            kwargs:
              fields_group: feature
          data_loader:
            class: QlibDataLoader
            kwargs:
              config:
                feature:
                - ($close-$open)/$open
                - ($high-$low)/$open
                - ($close-$open)/($high-$low+1e-12)
                - ($high-Greater($open, $close))/$open
                - ($high-Greater($open, $close))/($high-$low+1e-12)
                - (Less($open, $close)-$low)/$open
                - (Less($open, $close)-$low)/($high-$low+1e-12)
                - (2*$close-$high-$low)/$open
                - (2*$close-$high-$low)/($high-$low+1e-12)
                - $open/$close
                - $high/$close
                - $low/$close
                - $vwap/$close
                - Ref($close, 5)/$close
                - Ref($close, 10)/$close
                - Ref($close, 20)/$close
                - Ref($close, 30)/$close
                - Ref($close, 60)/$close
                - Mean($close, 5)/$close
                - Mean($close, 10)/$close
                - Mean($close, 20)/$close
                - Mean($close, 30)/$close
                - Mean($close, 60)/$close
                - Std($close, 5)/$close
                - Std($close, 10)/$close
                - Std($close, 20)/$close
                - Std($close, 30)/$close
                - Std($close, 60)/$close
                - Slope($close, 5)/$close
                - Slope($close, 10)/$close
                - Slope($close, 20)/$close
                - Slope($close, 30)/$close
                - Slope($close, 60)/$close
                - Rsquare($close, 5)
                - Rsquare($close, 10)
                - Rsquare($close, 20)
                - Rsquare($close, 30)
                - Rsquare($close, 60)
                - Resi($close, 5)/$close
                - Resi($close, 10)/$close
                - Resi($close, 20)/$close
                - Resi($close, 30)/$close
                - Resi($close, 60)/$close
                - Max($high, 5)/$close
                - Max($high, 10)/$close
                - Max($high, 20)/$close
                - Max($high, 30)/$close
                - Max($high, 60)/$close
                - Min($low, 5)/$close
                - Min($low, 10)/$close
                - Min($low, 20)/$close
                - Min($low, 30)/$close
                - Min($low, 60)/$close
                - Quantile($close, 5, 0.8)/$close
                - Quantile($close, 10, 0.8)/$close
                - Quantile($close, 20, 0.8)/$close
                - Quantile($close, 30, 0.8)/$close
                - Quantile($close, 60, 0.8)/$close
                - Quantile($close, 5, 0.2)/$close
                - Quantile($close, 10, 0.2)/$close
                - Quantile($close, 20, 0.2)/$close
                - Quantile($close, 30, 0.2)/$close
                - Quantile($close, 60, 0.2)/$close
                - Rank($close, 5)
                - Rank($close, 10)
                - Rank($close, 20)
                - Rank($close, 30)
                - Rank($close, 60)
                - ($close-Min($low, 5))/(Max($high, 5)-Min($low, 5)+1e-12)
                - ($close-Min($low, 10))/(Max($high, 10)-Min($low, 10)+1e-12)
                - ($close-Min($low, 20))/(Max($high, 20)-Min($low, 20)+1e-12)
                - ($close-Min($low, 30))/(Max($high, 30)-Min($low, 30)+1e-12)
                - ($close-Min($low, 60))/(Max($high, 60)-Min($low, 60)+1e-12)
                - IdxMax($high, 5)/5
                - IdxMax($high, 10)/10
                - IdxMax($high, 20)/20
                - IdxMax($high, 30)/30
                - IdxMax($high, 60)/60
                - IdxMin($low, 5)/5
                - IdxMin($low, 10)/10
                - IdxMin($low, 20)/20
                - IdxMin($low, 30)/30
                - IdxMin($low, 60)/60
                - (IdxMax($high, 5)-IdxMin($low, 5))/5
                - (IdxMax($high, 10)-IdxMin($low, 10))/10
                - (IdxMax($high, 20)-IdxMin($low, 20))/20
                - (IdxMax($high, 30)-IdxMin($low, 30))/30
                - (IdxMax($high, 60)-IdxMin($low, 60))/60
                - Corr($close, Log($volume+1), 5)
                - Corr($close, Log($volume+1), 10)
                - Corr($close, Log($volume+1), 20)
                - Corr($close, Log($volume+1), 30)
                - Corr($close, Log($volume+1), 60)
                - Corr($close/Ref($close,1), Log($volume/Ref($volume, 1)+1), 5)
                - Corr($close/Ref($close,1), Log($volume/Ref($volume, 1)+1), 10)
                - Corr($close/Ref($close,1), Log($volume/Ref($volume, 1)+1), 20)
                - Corr($close/Ref($close,1), Log($volume/Ref($volume, 1)+1), 30)
                - Corr($close/Ref($close,1), Log($volume/Ref($volume, 1)+1), 60)
                - Mean($close>Ref($close, 1), 5)
                - Mean($close>Ref($close, 1), 10)
                - Mean($close>Ref($close, 1), 20)
                - Mean($close>Ref($close, 1), 30)
                - Mean($close>Ref($close, 1), 60)
                - Mean($close<Ref($close, 1), 5)
                - Mean($close<Ref($close, 1), 10)
                - Mean($close<Ref($close, 1), 20)
                - Mean($close<Ref($close, 1), 30)
                - Mean($close<Ref($close, 1), 60)
                - Mean($close>Ref($close, 1), 5)-Mean($close<Ref($close, 1), 5)
                - Mean($close>Ref($close, 1), 10)-Mean($close<Ref($close, 1), 10)
                - Mean($close>Ref($close, 1), 20)-Mean($close<Ref($close, 1), 20)
                - Mean($close>Ref($close, 1), 30)-Mean($close<Ref($close, 1), 30)
                - Mean($close>Ref($close, 1), 60)-Mean($close<Ref($close, 1), 60)
                - Sum(Greater($close-Ref($close, 1), 0), 5)/(Sum(Abs($close-Ref($close,
                  1)), 5)+1e-12)
                - Sum(Greater($close-Ref($close, 1), 0), 10)/(Sum(Abs($close-Ref($close,
                  1)), 10)+1e-12)
                - Sum(Greater($close-Ref($close, 1), 0), 20)/(Sum(Abs($close-Ref($close,
                  1)), 20)+1e-12)
                - Sum(Greater($close-Ref($close, 1), 0), 30)/(Sum(Abs($close-Ref($close,
                  1)), 30)+1e-12)
                - Sum(Greater($close-Ref($close, 1), 0), 60)/(Sum(Abs($close-Ref($close,
                  1)), 60)+1e-12)
                - Sum(Greater(Ref($close, 1)-$close, 0), 5)/(Sum(Abs($close-Ref($close,
                  1)), 5)+1e-12)
                - Sum(Greater(Ref($close, 1)-$close, 0), 10)/(Sum(Abs($close-Ref($close,
                  1)), 10)+1e-12)
                - Sum(Greater(Ref($close, 1)-$close, 0), 20)/(Sum(Abs($close-Ref($close,
                  1)), 20)+1e-12)
                - Sum(Greater(Ref($close, 1)-$close, 0), 30)/(Sum(Abs($close-Ref($close,
                  1)), 30)+1e-12)
                - Sum(Greater(Ref($close, 1)-$close, 0), 60)/(Sum(Abs($close-Ref($close,
                  1)), 60)+1e-12)
                - (Sum(Greater($close-Ref($close, 1), 0), 5)-Sum(Greater(Ref($close,
                  1)-$close, 0), 5))/(Sum(Abs($close-Ref($close, 1)), 5)+1e-12)
                - (Sum(Greater($close-Ref($close, 1), 0), 10)-Sum(Greater(Ref($close,
                  1)-$close, 0), 10))/(Sum(Abs($close-Ref($close, 1)), 10)+1e-12)
                - (Sum(Greater($close-Ref($close, 1), 0), 20)-Sum(Greater(Ref($close,
                  1)-$close, 0), 20))/(Sum(Abs($close-Ref($close, 1)), 20)+1e-12)
                - (Sum(Greater($close-Ref($close, 1), 0), 30)-Sum(Greater(Ref($close,
                  1)-$close, 0), 30))/(Sum(Abs($close-Ref($close, 1)), 30)+1e-12)
                - (Sum(Greater($close-Ref($close, 1), 0), 60)-Sum(Greater(Ref($close,
                  1)-$close, 0), 60))/(Sum(Abs($close-Ref($close, 1)), 60)+1e-12)
                - Mean($volume, 5)/($volume+1e-12)
                - Mean($volume, 10)/($volume+1e-12)
                - Mean($volume, 20)/($volume+1e-12)
                - Mean($volume, 30)/($volume+1e-12)
                - Mean($volume, 60)/($volume+1e-12)
                - Std($volume, 5)/($volume+1e-12)
                - Std($volume, 10)/($volume+1e-12)
                - Std($volume, 20)/($volume+1e-12)
                - Std($volume, 30)/($volume+1e-12)
                - Std($volume, 60)/($volume+1e-12)
                - Std(Abs($close/Ref($close, 1)-1)*$volume, 5)/(Mean(Abs($close/Ref($close,
                  1)-1)*$volume, 5)+1e-12)
                - Std(Abs($close/Ref($close, 1)-1)*$volume, 10)/(Mean(Abs($close/Ref($close,
                  1)-1)*$volume, 10)+1e-12)
                - Std(Abs($close/Ref($close, 1)-1)*$volume, 20)/(Mean(Abs($close/Ref($close,
                  1)-1)*$volume, 20)+1e-12)
                - Std(Abs($close/Ref($close, 1)-1)*$volume, 30)/(Mean(Abs($close/Ref($close,
                  1)-1)*$volume, 30)+1e-12)
                - Std(Abs($close/Ref($close, 1)-1)*$volume, 60)/(Mean(Abs($close/Ref($close,
                  1)-1)*$volume, 60)+1e-12)
                - Sum(Greater($volume-Ref($volume, 1), 0), 5)/(Sum(Abs($volume-Ref($volume,
                  1)), 5)+1e-12)
                - Sum(Greater($volume-Ref($volume, 1), 0), 10)/(Sum(Abs($volume-Ref($volume,
                  1)), 10)+1e-12)
                - Sum(Greater($volume-Ref($volume, 1), 0), 20)/(Sum(Abs($volume-Ref($volume,
                  1)), 20)+1e-12)
                - Sum(Greater($volume-Ref($volume, 1), 0), 30)/(Sum(Abs($volume-Ref($volume,
                  1)), 30)+1e-12)
                - Sum(Greater($volume-Ref($volume, 1), 0), 60)/(Sum(Abs($volume-Ref($volume,
                  1)), 60)+1e-12)
                - Sum(Greater(Ref($volume, 1)-$volume, 0), 5)/(Sum(Abs($volume-Ref($volume,
                  1)), 5)+1e-12)
                - Sum(Greater(Ref($volume, 1)-$volume, 0), 10)/(Sum(Abs($volume-Ref($volume,
                  1)), 10)+1e-12)
                - Sum(Greater(Ref($volume, 1)-$volume, 0), 20)/(Sum(Abs($volume-Ref($volume,
                  1)), 20)+1e-12)
                - Sum(Greater(Ref($volume, 1)-$volume, 0), 30)/(Sum(Abs($volume-Ref($volume,
                  1)), 30)+1e-12)
                - Sum(Greater(Ref($volume, 1)-$volume, 0), 60)/(Sum(Abs($volume-Ref($volume,
                  1)), 60)+1e-12)
                - (Sum(Greater($volume-Ref($volume, 1), 0), 5)-Sum(Greater(Ref($volume,
                  1)-$volume, 0), 5))/(Sum(Abs($volume-Ref($volume, 1)), 5)+1e-12)
                - (Sum(Greater($volume-Ref($volume, 1), 0), 10)-Sum(Greater(Ref($volume,
                  1)-$volume, 0), 10))/(Sum(Abs($volume-Ref($volume, 1)), 10)+1e-12)
                - (Sum(Greater($volume-Ref($volume, 1), 0), 20)-Sum(Greater(Ref($volume,
                  1)-$volume, 0), 20))/(Sum(Abs($volume-Ref($volume, 1)), 20)+1e-12)
                - (Sum(Greater($volume-Ref($volume, 1), 0), 30)-Sum(Greater(Ref($volume,
                  1)-$volume, 0), 30))/(Sum(Abs($volume-Ref($volume, 1)), 30)+1e-12)
                - (Sum(Greater($volume-Ref($volume, 1), 0), 60)-Sum(Greater(Ref($volume,
                  1)-$volume, 0), 60))/(Sum(Abs($volume-Ref($volume, 1)), 60)+1e-12)
                - $close/Ref($close, 5)-1
                - $close/Ref($close, 10)-1
                - $close/Ref($close, 20)-1
                - Std($close, 10)
                - $volume/Ref($volume, 10)-1
                label:
                - (Ref($close, -10) / Ref($close, -1) - 1) - Mean(Ref($close, -10)
                  / Ref($close, -1) - 1, 10)
      segments:
        train:
        - '2021-01-01'
        - '2024-12-31'
        valid:
        - '2025-01-01'
        - '2025-06-30'
        test:
        - '2025-07-01'
        - '2026-06-18'
port_analysis_config:
  strategy:
    class: BiweeklyTrendStrategy
    module_path: src.strategies.biweekly_trend_strategy
    kwargs:
      signal: <PRED>
      topk: 5
      rebalance_steps: 10
      min_hold_days: 10
      sell_ma_window: 60
      sell_rank_threshold: 20
      buy_score_threshold: 0.0
      sell_score_threshold: 0.0
      use_risk_manager: true
      risk_config:
        stop_loss_pct: -0.1
        trailing_stop_pct: -0.15
        max_position_weight: 0.2
        max_sector_weight: 0.35
        target_portfolio_vol: 0.15
  backtest:
    start_time: '2026-01-01'
    end_time: '2026-04-03'
    account: 10000
    benchmark: QQQ
    exchange_kwargs:
      limit_threshold: 0.095
      deal_price: close
      open_cost: 0.001
      close_cost: 0.001
      min_cost: 0
