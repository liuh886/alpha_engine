name: Online Validation

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to validate
        required: true
        default: main
      run_notebooks:
        description: Execute notebook smoke path
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 1
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv and dependencies
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          uv sync --frozen --extra dev

      - name: Fast backend validation
        run: |
          uv run ruff check src api_server.py scripts tests
          uv run pytest tests/test_notebook_lab_contracts.py -q --strict-markers --tb=short --disable-warnings --maxfail=1

      - name: Install notebook runner
        if: inputs.run_notebooks == 'true'
        run: uv pip install nbconvert ipykernel

      - name: Execute notebook smoke path
        if: inputs.run_notebooks == 'true'
        run: |
          uv run jupyter nbconvert --to notebook --execute notebooks/00_data_download_and_sync.ipynb --output /tmp/00_data_download_and_sync.out.ipynb --ExecutePreprocessor.timeout=1800
          uv run jupyter nbconvert --to notebook --execute notebooks/01_factor_research.ipynb --output /tmp/01_factor_research.out.ipynb --ExecutePreprocessor.timeout=1800
          uv run jupyter nbconvert --to notebook --execute notebooks/end_to_end_training_pipeline.ipynb --output /tmp/end_to_end_training_pipeline.out.ipynb --ExecutePreprocessor.timeout=1800
          if [ -f notebooks/06_risk_controlled_momentum_grid.ipynb ]; then
            uv run jupyter nbconvert --to notebook --execute notebooks/06_risk_controlled_momentum_grid.ipynb --output /tmp/06_risk_controlled_momentum_grid.out.ipynb --ExecutePreprocessor.timeout=1800
          fi
          test -f data/factor_selection.json
          ls artifacts/evidence/notebook_10d_lab/*.json

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: online-validation-${{ inputs.ref }}
          path: |
            data/factor_selection.json
            artifacts/evidence/notebook_10d_lab/*.json
            /tmp/*_out.ipynb
          if-no-files-found: ignore
