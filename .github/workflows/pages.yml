name: Deploy Static Dashboard to Pages

on:
  push:
    branches: ["main"]
    paths:
      - 'qlib-dashboard/**'
      - 'scripts/export_static_site_data.py'
      - '.github/workflows/pages.yml'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: qlib-dashboard/package-lock.json

      - name: Build frontend
        working-directory: ./qlib-dashboard
        run: |
          npm ci
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Export static site data
        run: |
          pip install -e .
          python scripts/export_static_site_data.py --output artifacts/site/data

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r qlib-dashboard/dist/* _site/
          cp -r artifacts/site/data _site/data 2>/dev/null || true
          cp -r artifacts/site/reports _site/reports 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
