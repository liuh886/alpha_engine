name: Apply issue 128 migration

on:
  pull_request:
    branches: [main]

jobs:
  apply:
    if: github.head_ref == 'fix/issue-128-partial-snapshot-benchmark' && github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-128-partial-snapshot-benchmark
          fetch-depth: 0
      - name: Apply migration
        shell: bash
        run: |
          set +e
          python scripts/apply_issue_128_migration.py > issue128_migration.log 2>&1
          status=$?
          cat issue128_migration.log
          exit $status
      - name: Upload migration log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-128-migration-log
          path: issue128_migration.log
          if-no-files-found: error
          retention-days: 2
      - name: Commit migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/snapshot.py scripts/update_data.py tests/test_data_runtime_truth.py .github/workflows/ci.yml
          git commit -m "fix(data): publish truthful partial snapshots"
          git push origin HEAD:fix/issue-128-partial-snapshot-benchmark
