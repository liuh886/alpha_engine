name: Live CSI300 AkShare adapter

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  live-adapter:
    if: github.head_ref == 'fix/issue-124-csi300-akshare-index'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install locked environment
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          uv sync --frozen --extra dev
      - name: Execute production adapter
        shell: bash
        run: |
          set +e
          timeout 600 uv run python - <<'PY' > csi300_adapter.log 2>&1
          from __future__ import annotations

          import json
          from pathlib import Path

          from src.data.adapters.akshare_adapter import AkShareAdapter
          from src.data.adapters.base import FetchRequest
          from src.data.validation.schema import validate_market_data

          result = AkShareAdapter().fetch_daily_bars(
              FetchRequest(
                  symbol="000300",
                  market="cn",
                  start="2021-01-01",
                  end="2026-07-12",
              )
          )
          valid, _, errors = validate_market_data(result.df, "000300")
          payload = {
              "provider": result.provider,
              "symbol": result.symbol,
              "provider_symbol": result.provider_symbol,
              "rows": int(len(result.df)),
              "first_date": result.df["date"].min().strftime("%Y-%m-%d"),
              "last_date": result.df["date"].max().strftime("%Y-%m-%d"),
              "schema_valid": bool(valid),
              "schema_errors": errors,
              "amount_all_missing": bool(result.df["amount"].isna().all()),
              "volume_non_missing": int(result.df["volume"].notna().sum()),
          }
          Path("csi300_adapter.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True),
              encoding="utf-8",
          )
          print(json.dumps(payload, indent=2, sort_keys=True))
          assert result.provider_symbol == "sh000300"
          assert payload["first_date"] == "2021-01-04"
          assert valid, errors
          assert payload["volume_non_missing"] == payload["rows"]
          PY
          status=$?
          echo "$status" > csi300_adapter.exit
          cat csi300_adapter.log
          exit $status
      - name: Upload live adapter evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: csi300-akshare-adapter-live
          path: |
            csi300_adapter.json
            csi300_adapter.log
            csi300_adapter.exit
          if-no-files-found: warn
          retention-days: 7
