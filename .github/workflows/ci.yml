name: Alpha Engine CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv and locked Python dependencies
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          uv sync --frozen --extra dev

      - name: Ruff lint
        run: uv run ruff check src api_server.py

      - name: Mypy type check (ratcheted scope)
        run: uv run mypy src/release src/models/metric_contract.py

      - name: Fast PR pytest
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set +e
          uv run pytest tests/test_labels.py tests/test_training_label_direction.py tests/test_model_signal_identity.py tests/test_api_contract.py tests/test_walk_forward_stability.py tests/test_rolling_windows.py tests/test_ranker_calibration_grid.py tests/test_ranker_grid_experiment_contract.py tests/test_stable_signal_blend.py tests/test_stable_blend_missing_data.py tests/test_model_decision_pack.py tests/test_universe_robustness.py tests/test_multi_market_readiness.py tests/test_market_data_alignment.py tests/test_cn_feature_quality.py tests/test_factor_library.py tests/test_research_paradigm.py tests/test_research_artifacts.py tests/test_spec_bound_execution.py tests/test_cn_qlib_execution_adapter.py tests/test_us_qlib_execution_adapter.py tests/test_portfolio_intent.py tests/test_vectorized_backtest_intent_wrapper.py tests/test_promotion_decision.py tests/test_promotion_consumers.py tests/test_post_identity_promotion.py tests/test_synthetic_evidence_scope.py tests/test_decision_pack_cli_consumer.py tests/test_legacy_cn_runner_wrapper.py tests/test_legacy_rolling_ranker_wrapper.py tests/test_legacy_ranker_grid_wrapper.py tests/test_qlib_adapter_decision_boundary.py tests/test_qlib_execution_common.py tests/test_evaluation_context_boundary.py tests/test_universe_robustness_diagnostic_boundary.py tests/test_daily_ranker_missing_data.py tests/test_real_market_acceptance.py tests/test_research_universe_contracts.py tests/test_spec_bound_factor_diagnostics.py tests/test_dump_bin_market_identity.py tests/test_real_market_research_pipeline.py tests/test_provider_evidence.py tests/test_router_provider_attempts.py tests/test_data_runtime_truth.py tests/test_declared_refresh_interval.py tests/test_yfinance_adapter.py tests/test_akshare_adapter.py -q --strict-markers --tb=short --disable-warnings --maxfail=1 > fast_pr_pytest.log 2>&1
          status=$?
          cat fast_pr_pytest.log
          exit $status

      - name: Upload Fast PR pytest log
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: fast-pr-pytest-log
          path: fast_pr_pytest.log
          if-no-files-found: error
          retention-days: 7

      - name: CN Qlib fixture integration
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set +e
          uv run pytest tests/test_cn_qlib_ci_integration.py -q --strict-markers --tb=short --disable-warnings --maxfail=1 > cn_qlib_ci.log 2>&1
          status=$?
          cat cn_qlib_ci.log
          exit $status

      - name: Upload CN Qlib integration log
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: cn-qlib-ci-log
          path: cn_qlib_ci.log
          if-no-files-found: error
          retention-days: 7

      - name: Full release pytest
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: uv run pytest tests/test_release_candidate_generation.py tests/test_release_candidate_gate.py tests/test_walk_forward.py tests/test_vectorized_backtest.py -q --strict-markers --tb=short --disable-warnings --maxfail=1

      - name: Package build
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: uv build

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: qlib-dashboard/package-lock.json

      - name: Install frontend dependencies
        working-directory: qlib-dashboard
        run: npm ci

      - name: TypeScript type check
        working-directory: qlib-dashboard
        run: npx tsc --noEmit

      - name: Frontend lint
        working-directory: qlib-dashboard
        run: npm run lint

      - name: Frontend unit tests
        working-directory: qlib-dashboard
        run: npm test

      - name: Frontend build
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        working-directory: qlib-dashboard
        run: npm run build

      - name: Install Playwright browsers
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        working-directory: qlib-dashboard
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E tests
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        working-directory: qlib-dashboard
        run: npx playwright test

      - name: Upload frontend build artifact
        if: success() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: qlib-dashboard/dist/
          if-no-files-found: warn
