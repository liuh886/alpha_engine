name: Alpha Engine CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-adapter-thinning:
    if: github.event_name == 'pull_request' && github.head_ref == 'refactor/thin-qlib-adapter-evidence' && github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/thin-qlib-adapter-evidence
          fetch-depth: 0

      - name: Remove adapter-owned decision outputs
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          files = [
              Path('src/research/cn_qlib_execution_adapter.py'),
              Path('src/research/us_qlib_execution_adapter.py'),
          ]
          import_block = '''from src.research.model_decision_pack import (\n    build_model_decision_pack,\n    render_model_decision_markdown,\n)\n'''
          replacement_tail = '''    stability = summarize_walk_forward_reports(reports, min_windows=min_windows)\n    write_json(paths.walk_forward_stability, stability)\n    metrics_summary = {\n        "schema_version": "1.0",\n        "experiment_id": plan.spec.experiment_id,\n        "n_reports": stability.get("n_reports"),\n        "n_candidates": stability.get("n_candidates"),\n        "best_candidate": stability.get("best_candidate"),\n    }\n    write_json(paths.metrics_summary, metrics_summary)\n\n    runtime_metadata["report_count"] = len(reports)\n    return SpecBoundExecutionResult(\n        status="passed",\n        effective_contract=effective_contract,\n        runtime_metadata=runtime_metadata,\n        evidence_paths={\n            **evidence_with_windows,\n            "walk_forward_stability": str(paths.walk_forward_stability),\n            "metrics_summary": str(paths.metrics_summary),\n        },\n    )\n'''
          for path in files:
              text = path.read_text(encoding='utf-8')
              if import_block not in text:
                  raise SystemExit(f'model decision import block not found: {path}')
              text = text.replace(import_block, '', 1)
              marker = '    stability = summarize_walk_forward_reports(reports, min_windows=min_windows)\n'
              if marker not in text:
                  raise SystemExit(f'stability tail marker not found: {path}')
              text = text[: text.index(marker)] + replacement_tail
              path.write_text(text, encoding='utf-8')

          Path('tests/test_qlib_adapter_decision_boundary.py').write_text('''"""Architecture guard: adapters emit evidence, never lifecycle decisions."""\n\nfrom __future__ import annotations\n\nfrom pathlib import Path\n\nimport pytest\n\n\n@pytest.mark.parametrize(\n    "path",\n    [\n        Path("src/research/cn_qlib_execution_adapter.py"),\n        Path("src/research/us_qlib_execution_adapter.py"),\n    ],\n)\ndef test_qlib_adapters_do_not_build_decision_surfaces(path: Path) -> None:\n    source = path.read_text(encoding="utf-8")\n\n    assert "build_model_decision_pack" not in source\n    assert "render_model_decision_markdown" not in source\n    assert "decision_status" not in source\n    assert '"model_decision_pack":' not in source\n    assert '"model_decision_markdown":' not in source\n    assert '"walk_forward_stability":' in source\n    assert '"metrics_summary":' in source\n''', encoding='utf-8')
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/research/cn_qlib_execution_adapter.py src/research/us_qlib_execution_adapter.py tests/test_qlib_adapter_decision_boundary.py
          git commit -m "refactor(research): make Qlib adapters evidence-only"
          git push origin HEAD:refactor/thin-qlib-adapter-evidence

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv and locked Python dependencies
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          uv sync --frozen --extra dev
      - name: Ruff lint
        run: uv run ruff check src api_server.py
      - name: Mypy type check (ratcheted scope)
        run: uv run mypy src/release src/models/metric_contract.py
      - name: Fast PR pytest
        if: github.event_name == 'pull_request'
        run: uv run pytest tests/test_labels.py tests/test_training_label_direction.py tests/test_model_signal_identity.py tests/test_api_contract.py tests/test_walk_forward_stability.py tests/test_rolling_windows.py tests/test_ranker_calibration_grid.py tests/test_ranker_grid_experiment_contract.py tests/test_stable_signal_blend.py tests/test_model_decision_pack.py tests/test_universe_robustness.py tests/test_multi_market_readiness.py tests/test_market_data_alignment.py tests/test_cn_feature_quality.py tests/test_factor_library.py tests/test_research_paradigm.py tests/test_research_artifacts.py tests/test_spec_bound_execution.py tests/test_cn_qlib_execution_adapter.py tests/test_us_qlib_execution_adapter.py tests/test_portfolio_intent.py tests/test_vectorized_backtest_intent_wrapper.py tests/test_promotion_decision.py tests/test_promotion_consumers.py tests/test_post_identity_promotion.py tests/test_synthetic_evidence_scope.py tests/test_decision_pack_cli_consumer.py tests/test_legacy_cn_runner_wrapper.py tests/test_legacy_rolling_ranker_wrapper.py tests/test_legacy_ranker_grid_wrapper.py -q --strict-markers --tb=short --disable-warnings --maxfail=1
      - name: CN Qlib fixture integration
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set +e
          uv run pytest tests/test_cn_qlib_ci_integration.py -q --strict-markers --tb=short --disable-warnings --maxfail=1 > cn_qlib_ci.log 2>&1
          status=$?
          cat cn_qlib_ci.log
          exit $status
      - name: Upload CN Qlib integration log
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: cn-qlib-ci-log
          path: cn_qlib_ci.log
          if-no-files-found: error
          retention-days: 7
      - name: Full release pytest
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: uv run pytest tests/test_release_candidate_generation.py tests/test_release_candidate_gate.py tests/test_walk_forward.py tests/test_vectorized_backtest.py -q --strict-markers --tb=short --disable-warnings --maxfail=1
      - name: Package build
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: uv build

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: qlib-dashboard/package-lock.json
      - name: Install frontend dependencies
        working-directory: qlib-dashboard
        run: npm ci
      - name: TypeScript type check
        working-directory: qlib-dashboard
        run: npx tsc --noEmit
      - name: Frontend lint
        working-directory: qlib-dashboard
        run: npm run lint
      - name: Frontend unit tests
        working-directory: qlib-dashboard
        run: npm test
      - name: Frontend build
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        working-directory: qlib-dashboard
        run: npm run build
      - name: Install Playwright browsers
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        working-directory: qlib-dashboard
        run: npx playwright install --with-deps chromium
      - name: Playwright E2E tests
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        working-directory: qlib-dashboard
        run: npx playwright test
      - name: Upload frontend build artifact
        if: success() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: qlib-dashboard/dist/
          if-no-files-found: warn
