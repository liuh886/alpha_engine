name: Alpha Engine CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-real-data-boundaries:
    if: github.event_name == 'pull_request' && github.head_ref == 'fix/real-data-provider-boundaries' && github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/real-data-provider-boundaries
          fetch-depth: 0
      - name: Apply ingestion and provider fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          update_path = Path('scripts/update_data.py')
          text = update_path.read_text(encoding='utf-8')
          import_anchor = 'from src.data.snapshot import DataSnapshot\n'
          import_line = (
              'from src.data.symbol_identity import '
              'normalize_data_symbol, normalize_data_symbols\n'
          )
          if import_line not in text:
              if import_anchor not in text:
                  raise SystemExit('update_data import anchor not found')
              text = text.replace(import_anchor, import_anchor + import_line, 1)

          old_builder = '''def build_selected_universe(regions: dict[str, list[str]]) -> dict[str, list[str]]:
    """Return only markets that contain symbols after market filtering."""
    return {
        market: [str(symbol).upper() for symbol in symbols]
        for market, symbols in regions.items()
        if symbols
    }
'''
          new_builder = '''def build_selected_universe(regions: dict[str, list[str]]) -> dict[str, list[str]]:
    """Return stable, de-duplicated identities for selected market symbols."""
    universe: dict[str, list[str]] = {}
    for market, symbols in regions.items():
        normalized = normalize_data_symbols(market, symbols)
        if normalized:
            universe[market] = normalized
    return universe
'''
          if old_builder not in text:
              raise SystemExit('build_selected_universe block not found')
          text = text.replace(old_builder, new_builder, 1)

          region_anchor = '    regions = filter_regions_for_market(regions, args.market)\n\n'
          region_replacement = (
              '    regions = filter_regions_for_market(regions, args.market)\n'
              '    regions = {\n'
              '        market: normalize_data_symbols(market, symbols)\n'
              '        for market, symbols in regions.items()\n'
              '    }\n\n'
          )
          if region_anchor not in text:
              raise SystemExit('region normalization anchor not found')
          text = text.replace(region_anchor, region_replacement, 1)

          if '            qlib_ticker = str(t).upper()\n' not in text:
              raise SystemExit('qlib_ticker assignment not found')
          text = text.replace(
              '            qlib_ticker = str(t).upper()\n',
              '            qlib_ticker = normalize_data_symbol(reg, t)\n',
              1,
          )

          old_values = '                    values = df[field].fillna(0).values.astype("float32")\n'
          new_values = (
              '                    values = (\n'
              '                        pd.to_numeric(df[field], errors="coerce")\n'
              '                        .astype("float32")\n'
              '                        .to_numpy()\n'
              '                    )\n'
          )
          if old_values not in text:
              raise SystemExit('compatibility zero-fill line not found')
          text = text.replace(old_values, new_values, 1)
          update_path.write_text(text, encoding='utf-8')

          acceptance_path = Path('src/research/real_market_acceptance.py')
          text = acceptance_path.read_text(encoding='utf-8')
          parse_anchor = 'def _parse_instruments(path: Path) -> dict[str, tuple[pd.Timestamp, pd.Timestamp]]:\n'
          resolver = '''def _resolve_instrument_file(provider_path: Path, market: str) -> Path:
    """Resolve Qlib instrument metadata across market-specific and dump_all layouts."""

    instruments_dir = provider_path / "instruments"
    for filename in (f"{market}.txt", "all.txt"):
        candidate = instruments_dir / filename
        if candidate.is_file():
            return candidate
    raise FileNotFoundError(
        f"instrument metadata is missing for market={market}: "
        f"expected {market}.txt or all.txt under {instruments_dir}"
    )


'''
          if resolver not in text:
              if parse_anchor not in text:
                  raise SystemExit('instrument parser anchor not found')
              text = text.replace(parse_anchor, resolver + parse_anchor, 1)

          old_instrument = '''    instrument_rows: dict[str, tuple[pd.Timestamp, pd.Timestamp]] = {}
    instrument_error: str | None = None
    instrument_file = provider_path / "instruments" / f"{spec.market}.txt"
    try:
        instrument_rows = _parse_instruments(instrument_file)
    except Exception as exc:  # noqa: BLE001
        instrument_error = str(exc)
'''
          new_instrument = '''    instrument_rows: dict[str, tuple[pd.Timestamp, pd.Timestamp]] = {}
    instrument_error: str | None = None
    instrument_file = provider_path / "instruments" / f"{spec.market}.txt"
    try:
        instrument_file = _resolve_instrument_file(provider_path, spec.market)
        instrument_rows = _parse_instruments(instrument_file)
    except Exception as exc:  # noqa: BLE001
        instrument_error = str(exc)
'''
          if old_instrument not in text:
              raise SystemExit('acceptance instrument block not found')
          text = text.replace(old_instrument, new_instrument, 1)
          acceptance_path.write_text(text, encoding='utf-8')

          watchlist_path = Path('configs/watchlist.yaml')
          payload = yaml.safe_load(watchlist_path.read_text(encoding='utf-8')) or {}
          if not isinstance(payload, dict):
              raise SystemExit('watchlist must be a mapping')
          from src.data.symbol_identity import normalize_data_symbols
          normalized_payload = {
              market: normalize_data_symbols(market, symbols or [])
              for market, symbols in payload.items()
          }
          watchlist_path.write_text(
              yaml.safe_dump(normalized_payload, sort_keys=False),
              encoding='utf-8',
          )
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/update_data.py src/research/real_market_acceptance.py configs/watchlist.yaml
          git commit -m "fix(data): preserve provider and symbol identity"
          git push origin HEAD:fix/real-data-provider-boundaries

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv and locked Python dependencies
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          uv sync --frozen --extra dev

      - name: Ruff lint
        run: uv run ruff check src api_server.py

      - name: Mypy type check (ratcheted scope)
        run: uv run mypy src/release src/models/metric_contract.py

      - name: Fast PR pytest
        if: github.event_name == 'pull_request'
        run: uv run pytest tests/test_labels.py tests/test_training_label_direction.py tests/test_model_signal_identity.py tests/test_api_contract.py tests/test_walk_forward_stability.py tests/test_rolling_windows.py tests/test_ranker_calibration_grid.py tests/test_ranker_grid_experiment_contract.py tests/test_stable_signal_blend.py tests/test_stable_blend_missing_data.py tests/test_model_decision_pack.py tests/test_universe_robustness.py tests/test_multi_market_readiness.py tests/test_market_data_alignment.py tests/test_cn_feature_quality.py tests/test_factor_library.py tests/test_research_paradigm.py tests/test_research_artifacts.py tests/test_spec_bound_execution.py tests/test_cn_qlib_execution_adapter.py tests/test_us_qlib_execution_adapter.py tests/test_portfolio_intent.py tests/test_vectorized_backtest_intent_wrapper.py tests/test_promotion_decision.py tests/test_promotion_consumers.py tests/test_post_identity_promotion.py tests/test_synthetic_evidence_scope.py tests/test_decision_pack_cli_consumer.py tests/test_legacy_cn_runner_wrapper.py tests/test_legacy_rolling_ranker_wrapper.py tests/test_legacy_ranker_grid_wrapper.py tests/test_qlib_adapter_decision_boundary.py tests/test_qlib_execution_common.py tests/test_evaluation_context_boundary.py tests/test_universe_robustness_diagnostic_boundary.py tests/test_daily_ranker_missing_data.py tests/test_real_market_acceptance.py tests/test_research_universe_contracts.py tests/test_spec_bound_factor_diagnostics.py tests/test_real_data_provider_boundaries.py -q --strict-markers --tb=short --disable-warnings --maxfail=1

      - name: CN Qlib fixture integration
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set +e
          uv run pytest tests/test_cn_qlib_ci_integration.py -q --strict-markers --tb=short --disable-warnings --maxfail=1 > cn_qlib_ci.log 2>&1
          status=$?
          cat cn_qlib_ci.log
          exit $status

      - name: Upload CN Qlib integration log
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: cn-qlib-ci-log
          path: cn_qlib_ci.log
          if-no-files-found: error
          retention-days: 7

      - name: Full release pytest
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: uv run pytest tests/test_release_candidate_generation.py tests/test_release_candidate_gate.py tests/test_walk_forward.py tests/test_vectorized_backtest.py -q --strict-markers --tb=short --disable-warnings --maxfail=1

      - name: Package build
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: uv build

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: qlib-dashboard/package-lock.json

      - name: Install frontend dependencies
        working-directory: qlib-dashboard
        run: npm ci

      - name: TypeScript type check
        working-directory: qlib-dashboard
        run: npx tsc --noEmit

      - name: Frontend lint
        working-directory: qlib-dashboard
        run: npm run lint

      - name: Frontend unit tests
        working-directory: qlib-dashboard
        run: npm test

      - name: Frontend build
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        working-directory: qlib-dashboard
        run: npm run build

      - name: Install Playwright browsers
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        working-directory: qlib-dashboard
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E tests
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        working-directory: qlib-dashboard
        run: npx playwright test

      - name: Upload frontend build artifact
        if: success() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: qlib-dashboard/dist/
          if-no-files-found: warn
