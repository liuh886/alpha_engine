name: Alpha Engine CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-portfolio-intent-wrapper:
    if: github.event_name == 'pull_request' && github.head_ref == 'refactor/portfolio-intent-wrapper-v2' && github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/portfolio-intent-wrapper-v2
          fetch-depth: 0

      - name: Apply migration and restore CI
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/research/vectorized_backtest.py')
          text = path.read_text(encoding='utf-8')

          anchor = '''    if require_raw_10d_returns:\n'''
          wrapper = '''    if non_overlapping:\n        # Compatibility boundary: canonical fixed-horizon evaluation is now\n        # owned by SignalFrame -> PortfolioIntent -> EvaluationReport. Keep\n        # this public function as a schema-compatible entry point.\n        from src.research.portfolio_intent import (  # noqa: PLC0415\n            run_score_backtest_via_intent,\n        )\n\n        return run_score_backtest_via_intent(\n            predictions,\n            returns,\n            benchmark_returns=benchmark_returns,\n            top_n=topk,\n            rebalance_days=rebalance_days,\n            initial_capital=initial_capital,\n            cost_bps=cost_bps,\n            require_raw_10d_returns=require_raw_10d_returns,\n        )\n\n'''
          if wrapper not in text:
              if anchor not in text:
                  raise SystemExit('raw-return gate anchor not found')
              text = text.replace(anchor, wrapper + anchor, 1)

          start_marker = '''    if non_overlapping:\n        # ── Non-overlapping: independent 10-day windows ──\n'''
          else_marker = '''    else:\n        # ── Overlapping (layered): each day opens a 1/N position held N days ──\n'''
          metrics_marker = '''    # Compute metrics\n'''
          if start_marker in text:
              start = text.index(start_marker)
              else_pos = text.index(else_marker, start)
              metrics_pos = text.index(metrics_marker, else_pos)
              layered = text[else_pos + len('    else:\n'):metrics_pos]
              layered = '\n'.join(
                  line[4:] if line.startswith('    ') else line
                  for line in layered.split('\n')
              )
              text = text[:start] + layered + text[metrics_pos:]

          old_doc = '''    non_overlapping : bool\n        If True, use non-overlapping returns (rebalance_days intervals).\n        This avoids inflated cumulative returns from overlapping periods.\n'''
          new_doc = '''    non_overlapping : bool\n        If True, delegate canonical fixed-horizon evaluation to the explicit\n        PortfolioIntent path. If False, retain the legacy layered compatibility\n        implementation.\n'''
          if old_doc in text:
              text = text.replace(old_doc, new_doc, 1)
          path.write_text(text, encoding='utf-8')

          test_path = Path('tests/test_portfolio_intent.py')
          tests = test_path.read_text(encoding='utf-8')
          addition = r'''


def test_legacy_non_overlapping_entrypoint_delegates_to_intent(monkeypatch) -> None:
    predictions, returns, benchmark = _fixture()
    sentinel = object()
    captured: dict[str, object] = {}

    def fake_run(predictions_arg, returns_arg, benchmark_returns=None, **kwargs):
        captured.update(
            {
                "predictions": predictions_arg,
                "returns": returns_arg,
                "benchmark_returns": benchmark_returns,
                **kwargs,
            }
        )
        return sentinel

    monkeypatch.setattr(
        "src.research.portfolio_intent.run_score_backtest_via_intent",
        fake_run,
    )
    result = run_vectorized_backtest(
        predictions,
        returns,
        benchmark_returns=benchmark,
        topk=7,
        rebalance_days=5,
        initial_capital=123_456.0,
        cost_bps=9.0,
        non_overlapping=True,
        require_raw_10d_returns=False,
    )

    assert result is sentinel
    assert captured["predictions"] is predictions
    assert captured["returns"] is returns
    assert captured["benchmark_returns"] is benchmark
    assert captured["top_n"] == 7
    assert captured["rebalance_days"] == 5
    assert captured["initial_capital"] == 123_456.0
    assert captured["cost_bps"] == 9.0
    assert captured["require_raw_10d_returns"] is False


def test_layered_compatibility_path_does_not_call_intent(monkeypatch) -> None:
    predictions, returns, benchmark = _fixture()

    def fail_if_called(*args, **kwargs):
        raise AssertionError("layered compatibility path must not call PortfolioIntent")

    monkeypatch.setattr(
        "src.research.portfolio_intent.run_score_backtest_via_intent",
        fail_if_called,
    )
    result = run_vectorized_backtest(
        predictions,
        returns,
        benchmark_returns=benchmark,
        topk=5,
        rebalance_days=10,
        non_overlapping=False,
    )

    assert result.n_periods > 0
    assert result.rebalance_days == 10
'''
          marker = 'def test_legacy_non_overlapping_entrypoint_delegates_to_intent'
          if marker not in tests:
              test_path.write_text(tests.rstrip() + addition + '\n', encoding='utf-8')
          PY

          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -f .github/workflows/tmp_apply_portfolio_intent_wrapper.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/research/vectorized_backtest.py tests/test_portfolio_intent.py .github/workflows/ci.yml .github/workflows/tmp_apply_portfolio_intent_wrapper.yml
          git commit -m "refactor(research): route non-overlapping backtest through PortfolioIntent"
          git push origin HEAD:refactor/portfolio-intent-wrapper-v2

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv and locked Python dependencies
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          uv sync --frozen --extra dev

      - name: Ruff lint
        run: uv run ruff check src api_server.py

      - name: Mypy type check (ratcheted scope)
        run: uv run mypy src/release src/models/metric_contract.py

      - name: Fast PR pytest
        if: github.event_name == 'pull_request'
        run: uv run pytest tests/test_labels.py tests/test_training_label_direction.py tests/test_model_signal_identity.py tests/test_api_contract.py tests/test_walk_forward_stability.py tests/test_rolling_windows.py tests/test_ranker_calibration_grid.py tests/test_ranker_grid_experiment_contract.py tests/test_stable_signal_blend.py tests/test_model_decision_pack.py tests/test_universe_robustness.py tests/test_multi_market_readiness.py tests/test_market_data_alignment.py tests/test_cn_feature_quality.py tests/test_factor_library.py tests/test_research_paradigm.py tests/test_research_artifacts.py tests/test_spec_bound_execution.py tests/test_cn_qlib_execution_adapter.py tests/test_us_qlib_execution_adapter.py tests/test_portfolio_intent.py tests/test_promotion_decision.py tests/test_promotion_consumers.py -q --strict-markers --tb=short --disable-warnings --maxfail=1

      - name: CN Qlib fixture integration
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set +e
          uv run pytest tests/test_cn_qlib_ci_integration.py -q --strict-markers --tb=short --disable-warnings --maxfail=1 > cn_qlib_ci.log 2>&1
          status=$?
          cat cn_qlib_ci.log
          exit $status

      - name: Upload CN Qlib integration log
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: cn-qlib-ci-log
          path: cn_qlib_ci.log
          if-no-files-found: error
          retention-days: 7

      - name: Full release pytest
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: uv run pytest tests/test_release_candidate_generation.py tests/test_release_candidate_gate.py tests/test_walk_forward.py tests/test_vectorized_backtest.py -q --strict-markers --tb=short --disable-warnings --maxfail=1

      - name: Package build
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: uv build

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: qlib-dashboard/package-lock.json

      - name: Install frontend dependencies
        working-directory: qlib-dashboard
        run: npm ci

      - name: TypeScript type check
        working-directory: qlib-dashboard
        run: npx tsc --noEmit

      - name: Frontend lint
        working-directory: qlib-dashboard
        run: npm run lint

      - name: Frontend unit tests
        working-directory: qlib-dashboard
        run: npm test

      - name: Frontend build
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        working-directory: qlib-dashboard
        run: npm run build

      - name: Install Playwright browsers
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        working-directory: qlib-dashboard
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E tests
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        working-directory: qlib-dashboard
        run: npx playwright test

      - name: Upload frontend build artifact
        if: success() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: qlib-dashboard/dist/
          if-no-files-found: warn
