name: Alpha Engine CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv and locked Python dependencies
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          uv sync --frozen --extra dev

      - name: Ruff lint
        run: uv run ruff check src api_server.py

      - name: Mypy type check (ratcheted scope)
        run: uv run mypy src/release src/models/metric_contract.py

      - name: Fast PR pytest
        if: github.event_name == 'pull_request'
        run: uv run pytest tests/test_labels.py tests/test_training_label_direction.py tests/test_model_signal_identity.py tests/test_api_contract.py tests/test_walk_forward_stability.py tests/test_rolling_windows.py tests/test_ranker_calibration_grid.py tests/test_ranker_grid_experiment_contract.py tests/test_stable_signal_blend.py -q --strict-markers --tb=short --disable-warnings --maxfail=1

      - name: Full release pytest
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: uv run pytest tests/test_release_candidate_generation.py tests/test_release_candidate_gate.py tests/test_walk_forward.py tests/test_vectorized_backtest.py -q --strict-markers --tb=short --disable-warnings --maxfail=1

      - name: Package build
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: uv build

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: qlib-dashboard/package-lock.json

      - name: Install frontend dependencies
        working-directory: qlib-dashboard
        run: npm ci

      - name: TypeScript type check
        working-directory: qlib-dashboard
        run: npx tsc --noEmit

      - name: Frontend lint
        working-directory: qlib-dashboard
        run: npm run lint

      - name: Frontend unit tests
        working-directory: qlib-dashboard
        run: npm test

      - name: Frontend build
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        working-directory: qlib-dashboard
        run: npm run build

      - name: Install Playwright browsers
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        working-directory: qlib-dashboard
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E tests
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        working-directory: qlib-dashboard
        run: npx playwright test

      - name: Upload frontend build artifact
        if: success() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: qlib-dashboard/dist/
          if-no-files-found: warn
