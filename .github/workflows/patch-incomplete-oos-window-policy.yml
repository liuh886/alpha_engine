name: Patch incomplete OOS window policy

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'fix/incomplete-oos-window-policy'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Narrow deterministic fixture anchors
        run: |
          python - <<'PY'
          from pathlib import Path

          patcher = Path('scripts/_patch_incomplete_oos_window_policy.py')
          text = patcher.read_text(encoding='utf-8')
          old = '''        '                "schema_version": "1.0",',
                  '                "schema_version": "1.1",','''
          new = '''        '                "schema_version": "1.0",\\n'
                  '                "experiment_id": "test_factor_diagnostics",',
                  '                "schema_version": "1.1",\\n'
                  '                "experiment_id": "test_factor_diagnostics",','''
          if text.count(old) != 1:
              raise SystemExit(
                  f'expected one ambiguous fixture literal block, found {text.count(old)}'
              )
          text = text.replace(old, new, 1)

          old_payload = '''    window_payload = {
              **window_plan.to_dict(),
              "experiment_id": plan.spec.experiment_id,
              "available_end": available_end,
          }
          '''
          new_payload = '''    window_payload = {
              **window_plan.to_dict(),
              "experiment_id": plan.spec.experiment_id,
              "available_end": available_end,
              "partial_windows_count_toward_min": False,
          }
          '''
          if text.count(old_payload) != 1:
              raise SystemExit(
                  f'expected one adapter payload block, found {text.count(old_payload)}'
              )
          patcher.write_text(
              text.replace(old_payload, new_payload, 1), encoding='utf-8'
          )

          test_path = Path('tests/test_window_policy.py')
          test_text = test_path.read_text(encoding='utf-8')
          old_expectation = '    assert plan.complete_window_count == 3\n'
          new_expectation = '    assert plan.complete_window_count == 2\n'
          if old_expectation in test_text:
              test_text = test_text.replace(old_expectation, new_expectation, 1)
          elif new_expectation not in test_text:
              raise SystemExit('complete-window expectation anchor not found')
          test_path.write_text(test_text, encoding='utf-8')

          diagnostic_path = Path('tests/test_spec_bound_factor_diagnostics.py')
          diagnostic_text = diagnostic_path.read_text(encoding='utf-8')
          old_tail_line = (
              '    assert all(row["excluded_tail_sessions"] == 10 '
              'for row in report["windows"])\n'
          )
          new_tail_block = (
              '    included_windows = [row for row in report["windows"] '
              'if row["status"] == "included"]\n'
              '    assert included_windows\n'
              '    assert all(row["excluded_tail_sessions"] == 10 '
              'for row in included_windows)\n'
          )
          if old_tail_line in diagnostic_text:
              diagnostic_text = diagnostic_text.replace(
                  old_tail_line, new_tail_block, 1
              )
          diagnostic_text = diagnostic_text.replace(
              '    assert report["schema_version"] == "1.2"\n',
              '    assert report["schema_version"] == "1.3"\n',
              1,
          )
          diagnostic_text = diagnostic_text.replace(
              'pd.Timestamp(window["test_end"])',
              'pd.Timestamp(window["effective_test_end"])',
          )
          diagnostic_path.write_text(diagnostic_text, encoding='utf-8')
          PY

      - name: Apply deterministic contract patch
        run: python scripts/_patch_incomplete_oos_window_policy.py

      - name: Apply reviewed adapter-sampling hardening
        run: python scripts/_harden_oos_adapter_sampling.py

      - name: Preserve excluded partial-window evidence
        run: python scripts/_harden_oos_policy_evidence.py

      - name: Migrate embedded paradigm test fixtures
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          schema_pattern = re.compile(
              r'(?P<indent>^[ \t]*)"schema_version": "1\.0",\n'
              r'(?P=indent)"experiment_id":',
              re.MULTILINE,
          )
          policy_pattern = re.compile(
              r'(?P<indent>^[ \t]*)"min_windows": (?P<value>[^,\n]+),\n'
              r'(?!(?P=indent)"partial_window_policy":)',
              re.MULTILINE,
          )
          duplicate_policy_pattern = re.compile(
              r'(?P<indent>^[ \t]*)"partial_window_policy": '
              r'"complete_windows_only",\n'
              r'(?P=indent)"train_embargo_sessions": 10,\n'
              r'(?P=indent)"partial_window_policy": '
              r'"complete_windows_only",\n',
              re.MULTILINE,
          )

          def migrate_schema(match: re.Match[str]) -> str:
              indent = match.group('indent')
              return (
                  f'{indent}"schema_version": "1.1",\n'
                  f'{indent}"experiment_id":'
              )

          def add_policy(match: re.Match[str]) -> str:
              indent = match.group('indent')
              value = match.group('value')
              return (
                  f'{indent}"min_windows": {value},\n'
                  f'{indent}"partial_window_policy": '
                  '"complete_windows_only",\n'
              )

          def dedupe_policy(match: re.Match[str]) -> str:
              indent = match.group('indent')
              return (
                  f'{indent}"partial_window_policy": '
                  '"complete_windows_only",\n'
                  f'{indent}"train_embargo_sessions": 10,\n'
              )

          schema_updates = 0
          policy_updates = 0
          duplicate_removals = 0
          changed_paths = []
          for path in sorted(Path('tests').rglob('*.py')):
              original = path.read_text(encoding='utf-8')
              text, schema_count = schema_pattern.subn(migrate_schema, original)
              text, policy_count = policy_pattern.subn(add_policy, text)
              text, duplicate_count = duplicate_policy_pattern.subn(
                  dedupe_policy, text
              )
              if text != original:
                  path.write_text(text, encoding='utf-8')
                  changed_paths.append(str(path))
              schema_updates += schema_count
              policy_updates += policy_count
              duplicate_removals += duplicate_count

          if schema_updates == 0:
              raise SystemExit('no remaining embedded paradigm schema fixtures migrated')
          print(
              f'migrated {schema_updates} schema entries, added '
              f'{policy_updates} policy entries, and removed '
              f'{duplicate_removals} duplicates across {len(changed_paths)} files'
          )
          for path in changed_paths:
              print(path)
          PY

      - name: Install locked environment
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          uv sync --frozen --extra dev

      - name: Validate focused change
        shell: bash
        run: |
          set +e
          {
            uv run ruff check \
              src/research/window_policy.py \
              src/research/paradigm.py \
              src/research/market_data_alignment.py \
              src/research/spec_bound_factor_diagnostics.py \
              src/research/spec_bound_execution.py \
              src/research/cn_qlib_execution_adapter.py \
              src/research/us_qlib_execution_adapter.py \
              tests
            ruff_status=$?
            echo "RUFF_STATUS=$ruff_status"

            uv run mypy \
              src/research/window_policy.py \
              src/research/paradigm.py \
              src/research/market_data_alignment.py \
              src/research/spec_bound_factor_diagnostics.py \
              src/research/spec_bound_execution.py \
              src/research/cn_qlib_execution_adapter.py \
              src/research/us_qlib_execution_adapter.py
            mypy_status=$?
            echo "MYPY_STATUS=$mypy_status"

            uv run pytest \
              tests/test_window_policy.py \
              tests/test_research_paradigm.py \
              tests/test_market_data_alignment.py \
              tests/test_spec_bound_factor_diagnostics.py \
              tests/test_real_market_acceptance.py \
              tests/test_real_market_research_pipeline.py \
              tests/test_spec_bound_execution.py \
              tests/test_cn_qlib_execution_adapter.py \
              tests/test_us_qlib_execution_adapter.py \
              tests/test_cn_qlib_ci_integration.py \
              -q --strict-markers --tb=short --disable-warnings --maxfail=1
            pytest_status=$?
            echo "PYTEST_STATUS=$pytest_status"

            if (( ruff_status || mypy_status || pytest_status )); then
              exit 1
            fi
          } > validation-output.log 2>&1
          status=$?
          cat validation-output.log
          exit "$status"

      - name: Upload focused validation output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: incomplete-oos-validation-log
          path: validation-output.log
          if-no-files-found: warn
          retention-days: 1

      - name: Commit patch
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'Patch already applied'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            configs/research_paradigms/cn_10d_csi300_baseline.yaml \
            configs/research_paradigms/us_10d_qqq_baseline.yaml \
            tests/fixtures/cn_qlib_ci/paradigm.yaml \
            src/research/paradigm.py \
            src/research/market_data_alignment.py \
            src/research/window_policy.py \
            src/research/spec_bound_factor_diagnostics.py \
            src/research/spec_bound_execution.py \
            src/research/cn_qlib_execution_adapter.py \
            src/research/us_qlib_execution_adapter.py \
            tests
          git commit -m 'fix(research): make incomplete OOS window policy explicit'
          git push origin HEAD:${{ github.head_ref }}
