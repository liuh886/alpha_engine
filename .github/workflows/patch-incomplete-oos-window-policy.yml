name: Patch incomplete OOS window policy

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'fix/incomplete-oos-window-policy'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Narrow deterministic fixture anchors
        run: |
          python - <<'PY'
          from pathlib import Path

          patcher = Path('scripts/_patch_incomplete_oos_window_policy.py')
          text = patcher.read_text(encoding='utf-8')
          old = '''        '                "schema_version": "1.0",',
                  '                "schema_version": "1.1",','''
          new = '''        '                "schema_version": "1.0",\\n'
                  '                "experiment_id": "test_factor_diagnostics",',
                  '                "schema_version": "1.1",\\n'
                  '                "experiment_id": "test_factor_diagnostics",','''
          if text.count(old) != 1:
              raise SystemExit(
                  f'expected one ambiguous fixture literal block, found {text.count(old)}'
              )
          patcher.write_text(text.replace(old, new, 1), encoding='utf-8')

          test_path = Path('tests/test_window_policy.py')
          test_text = test_path.read_text(encoding='utf-8')
          old_expectation = '    assert plan.complete_window_count == 3\n'
          new_expectation = '    assert plan.complete_window_count == 2\n'
          if old_expectation in test_text:
              test_text = test_text.replace(old_expectation, new_expectation, 1)
          elif new_expectation not in test_text:
              raise SystemExit('complete-window expectation anchor not found')
          test_path.write_text(test_text, encoding='utf-8')

          diagnostic_path = Path('tests/test_spec_bound_factor_diagnostics.py')
          diagnostic_text = diagnostic_path.read_text(encoding='utf-8')
          old_tail_line = (
              '    assert all(row["excluded_tail_sessions"] == 10 '
              'for row in report["windows"])\n'
          )
          new_tail_block = (
              '    included_windows = [row for row in report["windows"] '
              'if row["status"] == "included"]\n'
              '    assert included_windows\n'
              '    assert all(row["excluded_tail_sessions"] == 10 '
              'for row in included_windows)\n'
          )
          if old_tail_line in diagnostic_text:
              diagnostic_text = diagnostic_text.replace(
                  old_tail_line, new_tail_block, 1
              )
          elif new_tail_block not in diagnostic_text:
              raise SystemExit('diagnostic tail assertion line not found')
          diagnostic_text = diagnostic_text.replace(
              '    assert report["schema_version"] == "1.2"\n',
              '    assert report["schema_version"] == "1.3"\n',
              1,
          )
          diagnostic_text = diagnostic_text.replace(
              'pd.Timestamp(window["test_end"])',
              'pd.Timestamp(window["effective_test_end"])',
              1,
          )
          diagnostic_path.write_text(diagnostic_text, encoding='utf-8')
          PY

      - name: Apply deterministic contract patch
        shell: bash
        run: python scripts/_patch_incomplete_oos_window_policy.py

      - name: Apply reviewed adapter-sampling hardening
        run: python scripts/_harden_oos_adapter_sampling.py

      - name: Install locked environment
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          uv sync --frozen --extra dev

      - name: Validate focused change
        run: |
          uv run ruff check \
            src/research/window_policy.py \
            src/research/paradigm.py \
            src/research/market_data_alignment.py \
            src/research/spec_bound_factor_diagnostics.py \
            src/research/spec_bound_execution.py \
            src/research/cn_qlib_execution_adapter.py \
            src/research/us_qlib_execution_adapter.py \
            tests/test_window_policy.py \
            tests/test_research_paradigm.py \
            tests/test_market_data_alignment.py \
            tests/test_spec_bound_factor_diagnostics.py \
            tests/test_cn_qlib_ci_integration.py
          uv run mypy \
            src/research/window_policy.py \
            src/research/paradigm.py \
            src/research/market_data_alignment.py \
            src/research/spec_bound_factor_diagnostics.py \
            src/research/spec_bound_execution.py \
            src/research/cn_qlib_execution_adapter.py \
            src/research/us_qlib_execution_adapter.py
          uv run pytest \
            tests/test_window_policy.py \
            tests/test_research_paradigm.py \
            tests/test_market_data_alignment.py \
            tests/test_spec_bound_factor_diagnostics.py \
            tests/test_real_market_acceptance.py \
            tests/test_real_market_research_pipeline.py \
            tests/test_spec_bound_execution.py \
            tests/test_cn_qlib_execution_adapter.py \
            tests/test_us_qlib_execution_adapter.py \
            tests/test_cn_qlib_ci_integration.py \
            -q --strict-markers --tb=short --disable-warnings --maxfail=1

      - name: Commit patch
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'Patch already applied'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            configs/research_paradigms/cn_10d_csi300_baseline.yaml \
            configs/research_paradigms/us_10d_qqq_baseline.yaml \
            tests/fixtures/cn_qlib_ci/paradigm.yaml \
            src/research/paradigm.py \
            src/research/market_data_alignment.py \
            src/research/window_policy.py \
            src/research/spec_bound_factor_diagnostics.py \
            src/research/spec_bound_execution.py \
            src/research/cn_qlib_execution_adapter.py \
            src/research/us_qlib_execution_adapter.py \
            tests/test_window_policy.py \
            tests/test_research_paradigm.py \
            tests/test_spec_bound_factor_diagnostics.py \
            tests/test_cn_qlib_ci_integration.py
          git commit -m 'fix(research): make incomplete OOS window policy explicit'
          git push origin HEAD:${{ github.head_ref }}
