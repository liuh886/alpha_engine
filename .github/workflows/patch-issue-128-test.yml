name: Patch issue 128 snapshot identity test

on:
  pull_request:
    branches: [main]

jobs:
  patch:
    if: github.head_ref == 'fix/issue-128-partial-snapshot-benchmark' && github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-128-partial-snapshot-benchmark
          fetch-depth: 0
      - name: Patch test fixture
        run: python scripts/patch_issue_128_snapshot_identity_test.py
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/test_data_runtime_truth.py
          git commit -m "test(data): align snapshot identity fixture with provider"
          git push origin HEAD:fix/issue-128-partial-snapshot-benchmark
