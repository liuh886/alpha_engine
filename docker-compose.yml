version: '3.8'

services:
  agentic-api:
    build: 
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - ./configs:/app/configs
    environment:
      - TRADING_UI_PASSWORD=${TRADING_UI_PASSWORD:-alpha2026}
      - QLIB_DATA_PATH=/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  agentic-dashboard:
    build:
      context: ./qlib-dashboard
      dockerfile: Dockerfile.ui
    ports:
      - "5173:80"
    depends_on:
      - agentic-api
    restart: unless-stopped
